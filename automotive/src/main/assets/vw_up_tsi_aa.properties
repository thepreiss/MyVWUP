# Configurações do VW UP TSI para Android Auto
profile_1.pref.aa.pids.selected=[12, 11, 5, 15, 4, 17, 35, 14]
profile_1.pref.aa.pids.profile_1=[12, 11, 5, 15, 4, 17, 35, 14]
profile_1.pref.aa.pids.profile_2=[12, 11, 5, 15]
profile_1.pref.aa.pids.profile_3=[12, 11]
profile_1.pref.aa.pids.profile_4=[12, 35, 5, 15]
profile_1.pref.aa.surface.fps="10"
profile_1.pref.aa.pids.history.enabled=true

# Layout e Visual no AA (Otimizado para telas 10.26")
profile_1.pref.aa.max_pids_in_column.1="3"
profile_1.pref.aa.max_pids_in_column.2="3"
profile_1.pref.aa.max_pids_in_column.3="3"
profile_1.pref.aa.max_pids_in_column.4="3"

profile_1.pref.aa.screen_font_size.1="30"
profile_1.pref.aa.screen_font_size.2="28"
profile_1.pref.aa.screen_font_size.3="34"
profile_1.pref.aa.screen_font_size.4="34"

profile_1.pref.aa.theme.dynamic-selector.enabled=true
profile_1.pref.aa.break_label.1=true
profile_1.pref.aa.break_label.2=true
profile_1.pref.aa.break_label.3=true
profile_1.pref.aa.break_label.4=true

# Reconexão
profile_1.pref.adapter.reconnect=true
profile_1.pref.adapter.reconnect.max_retry="3"

profile_1.pref.profile.about=Perfil do VW UP TSI otimizado para Android Auto.
